name: ci

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Check OpenAPI docs are up to date
        run: |
          bun run docs:generate
          if [ -n "$(git status --porcelain -- docs/generated/)" ]; then
            echo "OpenAPI docs are out of date. Run 'bun run docs:generate' locally and commit the changes."
            git diff -- docs/generated/
            exit 1
          fi

  docker-build:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: pulih-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        run: |
          docker run -d --rm --name pulih-ci-smoke \
            -p 3002:3002 \
            pulih-api:ci-${{ github.sha }}

          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:3002/health/live > /dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            echo "Waiting for container... ($i/15)"
            sleep 2
          done

          LIVE=$(curl -sf http://127.0.0.1:3002/health/live)
          echo "Live: $LIVE"

          docker stop pulih-ci-smoke


