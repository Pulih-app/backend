name: main-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-deploy
  cancel-in-progress: false

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WORKER_ENV_FILE: ${{ secrets.WORKER_ENV_FILE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load deployment env
        shell: bash
        run: |
          if [ -z "$WORKER_ENV_FILE" ]; then
            echo "Missing required GitHub secret: WORKER_ENV_FILE"
            exit 1
          fi

          env_file="$RUNNER_TEMP/worker.env"
          umask 077
          printf '%s' "$WORKER_ENV_FILE" > "$env_file"

          while IFS= read -r line || [ -n "$line" ]; do
            line="${line%$'\r'}"
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"

            case "$line" in
              ''|'#'*) continue ;;
            esac

            key="${line%%=*}"
            value="${line#*=}"

            if ! [[ "$key" =~ ^[A-Z0-9_]+$ ]]; then
              echo "Invalid env key in WORKER_ENV_FILE: $key"
              exit 1
            fi

            echo "::add-mask::$value"
            printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
          done < "$env_file"

      - name: Validate required deployment env
        shell: bash
        run: |
          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            APP_NAME
            APP_ENV
            NODE_ENV
            PORT
            API_PREFIX
            APP_URL
            PWA_URL
            CORS_ALLOWED_ORIGINS
            REQUEST_ID_HEADER
            DATABASE_URL
            DIRECT_DATABASE_URL
            JWT_ACCESS_SECRET
            JWT_ACCESS_TTL_SECONDS
            PASSWORD_HASH_COST
            PAKASIR_PROJECT_SLUG
            PAKASIR_API_KEY
            PAKASIR_BASE_URL
            PAKASIR_PAYMENT_BASE_URL
            PAKASIR_PROVIDER_TIMEOUT_MS
            RESEND_API_KEY
            RESEND_FROM_EMAIL
            RESEND_FROM_NAME
            AI_BASE_URL
            AI_API_KEY
            AI_MODEL
            AI_TIMEOUT_MS
            AI_MAX_TOKENS
          )

          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required key in WORKER_ENV_FILE: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Review migration requirement
        run: |
          echo "Review generated SQL migrations before merging to main."
          echo "No destructive migration should run automatically."

      - name: Run database migrations
        run: bun run db:migrate
        env:
          # Demo-only workaround for Supabase/pg self-signed certificate chain in GitHub Actions.
          # Scope this to migrations only; remove when using a trusted CA setup.
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Sync Worker secrets
        shell: bash
        run: |
          put_secret() {
            key="$1"
            printf '%s' "${!key}" | bunx wrangler secret put "$key"
          }

          for key in \
            APP_NAME \
            APP_ENV \
            NODE_ENV \
            PORT \
            API_PREFIX \
            APP_URL \
            PWA_URL \
            CORS_ALLOWED_ORIGINS \
            REQUEST_ID_HEADER \
            DATABASE_URL \
            DIRECT_DATABASE_URL \
            JWT_ACCESS_SECRET \
            JWT_ACCESS_TTL_SECONDS \
            PASSWORD_HASH_COST \
            PAKASIR_PROJECT_SLUG \
            PAKASIR_API_KEY \
            PAKASIR_BASE_URL \
            PAKASIR_PAYMENT_BASE_URL \
            PAKASIR_PROVIDER_TIMEOUT_MS \
            RESEND_API_KEY \
            RESEND_FROM_EMAIL \
            RESEND_FROM_NAME \
            AI_BASE_URL \
            AI_API_KEY \
            AI_MODEL \
            AI_TIMEOUT_MS \
            AI_MAX_TOKENS; do
            put_secret "$key"
          done

      - name: Deploy to Cloudflare Workers
        run: bunx wrangler deploy
